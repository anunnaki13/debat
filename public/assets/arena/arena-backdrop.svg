<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Neon esports arena backdrop</title>
  <desc id="desc">A dark esports arena backdrop with LED screens, grid floor, spotlights, and holographic light beams.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020711"/>
      <stop offset=".55" stop-color="#06142c"/>
      <stop offset="1" stop-color="#12051f"/>
    </linearGradient>
    <radialGradient id="center" cx=".5" cy=".22" r=".52">
      <stop offset="0" stop-color="#15f8ff" stop-opacity=".28"/>
      <stop offset=".44" stop-color="#7b2cff" stop-opacity=".12"/>
      <stop offset="1" stop-color="#7b2cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#center)"/>
