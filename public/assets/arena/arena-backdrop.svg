    <path d="M394 92h412l-40 130H434z" fill="#07101c" stroke="#d8aa5c" stroke-width="3"/>
    <path d="M120 158h206M140 198h164M900 158h206M920 198h164M462 132h276M494 170h212" stroke="#ffffff" stroke-opacity=".42" stroke-width="5" stroke-linecap="round"/>
  </g>
