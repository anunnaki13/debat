<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">User esports player avatar</title>
  <desc id="desc">A cyan esports helmet avatar with visor and boom mic.</desc>
  <defs>
    <radialGradient id="bg" cx=".5" cy=".38" r=".7">
      <stop offset="0" stop-color="#15f8ff" stop-opacity=".35"/>
      <stop offset="1" stop-color="#07101c"/>
    </radialGradient>
    <linearGradient id="helmet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1cfaff"/>
      <stop offset=".45" stop-color="#174d95"/>
      <stop offset="1" stop-color="#06101e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="80" cy="80" r="78" fill="url(#bg)" stroke="#15f8ff" stroke-width="3"/>
  <circle cx="80" cy="80" r="62" fill="#07101c" stroke="#15f8ff" stroke-opacity=".5"/>
  <g filter="url(#glow)">
    <path d="M38 80c0-35 24-57 62-57 19 9 31 27 31 51 0 38-23 62-59 62-31-8-48-26-34-56z" fill="url(#helmet)" stroke="#15f8ff" stroke-width="4"/>
    <path d="M49 77c13-20 33-30 60-29 13 12 18 27 14 45H54z" fill="#07101c" stroke="#15f8ff" stroke-width="3"/>
    <path d="M61 78h65" stroke="#15f8ff" stroke-width="8" stroke-linecap="round"/>
    <path d="M63 96h50" stroke="#d8aa5c" stroke-width="5" stroke-linecap="round"/>
    <path d="M34 95h19v24H36c-11-8-12-16-2-24zM125 93h16c9 9 8 18-3 25h-16z" fill="#0f2542" stroke="#15f8ff" stroke-width="3"/>
    <path d="M123 110c18 1 27 8 27 21" stroke="#15f8ff" stroke-width="4" stroke-linecap="round"/>
    <circle cx="150" cy="132" r="5" fill="#15f8ff"/>
  </g>
