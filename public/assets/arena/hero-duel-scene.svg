<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Arena duel illustration</title>
  <desc id="desc">A premium debate arena scene with two AI-style opponents facing each other.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06122a"/>
      <stop offset=".52" stop-color="#0a1840"/>
      <stop offset="1" stop-color="#170a22"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx=".35" cy=".34" r=".52">
      <stop offset="0" stop-color="#38f5ff" stop-opacity=".42"/>
      <stop offset=".5" stop-color="#2f88ff" stop-opacity=".13"/>
      <stop offset="1" stop-color="#2f88ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coralGlow" cx=".7" cy=".32" r=".5">
      <stop offset="0" stop-color="#ff756e" stop-opacity=".36"/>
      <stop offset=".56" stop-color="#9c7cff" stop-opacity=".11"/>
      <stop offset="1" stop-color="#9c7cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skinA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffc58f"/>
      <stop offset="1" stop-color="#a34e37"/>
    </linearGradient>
    <linearGradient id="armorA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34e7e2"/>
      <stop offset=".5" stop-color="#1c5fc7"/>
      <stop offset="1" stop-color="#071426"/>
    </linearGradient>
    <linearGradient id="armorB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8d75"/>
      <stop offset=".55" stop-color="#8d3cff"/>
      <stop offset="1" stop-color="#180915"/>
    </linearGradient>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000" flood-opacity=".45"/>
    </filter>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

